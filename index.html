<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoリスト</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <main class="app">
        <h1>Todoリスト</h1>

        <form id="todo-form" class="todo-form">
            <input id="todo-input" class="todo-input" type="text" placeholder="タスクを入力してください">
            <button class="todo-add-button" type="submit">追加</button>
        </form>

        <ul id="todo-list" class="todo-list">
            <!-- ここにJavaScriptからTodoをリスト形式で追加する -->
        </ul>
    </main>
</body>

</html>
